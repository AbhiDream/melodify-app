<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>WAVR — Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #1a1a25;
  --border: #ffffff12;
  --accent: #c8ff57;
  --accent2: #57c8ff;
  --accent3: #ff57a8;
  --text: #f0f0f8;
  --muted: #666688;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg); color: var(--text);
  font-family: 'DM Mono', monospace; min-height: 100vh;
  display: flex; flex-direction: column; overflow-x: hidden;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 40% at 20% 20%, #c8ff5710 0%, transparent 60%),
              radial-gradient(ellipse 40% 60% at 80% 80%, #57c8ff08 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 24px 40px; border-bottom: 1px solid var(--border);
  position: relative; z-index: 10;
}
.logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 28px; letter-spacing: -1px; color: var(--accent); }
.logo span { color: var(--text); }
.tagline { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; }
.search-wrap { padding: 40px 40px 20px; position: relative; z-index: 10; }
.search-box { display: flex; gap: 12px; max-width: 680px; margin: 0 auto; }
.search-input {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px 20px; color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 14px; outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-input::placeholder { color: var(--muted); }
.search-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px #c8ff5720; }
.search-btn {
  background: var(--accent); color: #000; border: none; border-radius: 8px;
  padding: 14px 28px; font-family: 'Syne', sans-serif; font-weight: 700;
  font-size: 13px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
  transition: transform 0.15s, opacity 0.15s;
}
.search-btn:hover { transform: translateY(-1px); opacity: 0.9; }
.search-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.main { display: flex; flex: 1; position: relative; z-index: 10; }
.results-panel { flex: 1; padding: 20px 40px; overflow-y: auto; max-height: calc(100vh - 260px); }
.results-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 16px; }
.result-list { display: flex; flex-direction: column; gap: 8px; }
.result-card {
  display: flex; align-items: center; gap: 16px; background: var(--surface);
  border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px;
  cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.15s;
}
.result-card:hover { background: var(--surface2); border-color: #ffffff25; transform: translateX(4px); }
.result-card.active { border-color: var(--accent); background: #c8ff5710; }
.result-thumb { width: 60px; height: 44px; border-radius: 6px; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
.result-info { flex: 1; min-width: 0; }
.result-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
.result-meta { font-size: 11px; color: var(--muted); }
.result-dur { font-size: 12px; color: var(--muted); flex-shrink: 0; }
.player-panel {
  width: 380px; flex-shrink: 0; border-left: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column;
  padding: 32px 28px; position: sticky; top: 0;
  height: calc(100vh - 200px); overflow: hidden;
}
.now-playing-label { font-size: 10px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 24px; }
.artwork-wrap {
  position: relative; width: 100%; aspect-ratio: 1; border-radius: 16px;
  overflow: hidden; margin-bottom: 24px; background: var(--surface2);
}
.artwork-img { width: 100%; height: 100%; object-fit: cover; }
.artwork-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, #00000088); }
.vinyl-ring {
  position: absolute; inset: 0; border-radius: 50%; border: 3px solid #ffffff18;
  margin: 20%; animation: spin 8s linear infinite; animation-play-state: paused; pointer-events: none;
}
.vinyl-ring.spinning { animation-play-state: running; }
@keyframes spin { to { transform: rotate(360deg); } }
.waveform { position: absolute; bottom: 12px; left: 12px; right: 12px; height: 40px; display: flex; align-items: flex-end; gap: 2px; }
.waveform-bar { flex: 1; background: var(--accent); border-radius: 2px 2px 0 0; opacity: 0.7; }
.track-title { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.track-artist { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
.progress-bar-bg {
  width: 100%; height: 4px; background: var(--surface2); border-radius: 4px;
  cursor: pointer; position: relative; margin-bottom: 6px;
}
.buffer-bar { position: absolute; top: 0; left: 0; height: 100%; background: #ffffff20; border-radius: 4px; width: 0%; pointer-events: none; transition: width 0.5s; }
.progress-bar-fill { position: absolute; top: 0; left: 0; height: 100%; background: var(--accent); border-radius: 4px; width: 0%; pointer-events: none; }
.progress-bar-fill::after {
  content: ''; position: absolute; right: -5px; top: -4px; width: 12px; height: 12px;
  background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); opacity: 0; transition: opacity 0.2s;
}
.progress-bar-bg:hover .progress-bar-fill::after { opacity: 1; }
.time-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 20px; }
.chunk-status { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--muted); margin-bottom: 12px; height: 16px; }
.chunk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); flex-shrink: 0; }
.chunk-dot.loading { background: var(--accent2); animation: pulse 0.8s ease-in-out infinite; }
.chunk-dot.ready { background: var(--accent); }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.7); } }
.controls { display: flex; align-items: center; justify-content: center; gap: 20px; }
.ctrl-btn {
  background: none; border: none; cursor: pointer; color: var(--muted);
  display: flex; align-items: center; justify-content: center;
  border-radius: 50%; transition: color 0.15s, transform 0.15s; padding: 8px;
}
.ctrl-btn:hover { color: var(--text); transform: scale(1.1); }
.ctrl-btn.play-btn { width: 56px; height: 56px; background: var(--accent); color: #000; border-radius: 50%; padding: 0; }
.ctrl-btn.play-btn:hover { transform: scale(1.08); box-shadow: 0 0 24px #c8ff5750; }
.volume-row { display: flex; align-items: center; gap: 10px; margin-top: 20px; }
.volume-icon { color: var(--muted); }
.volume-slider { flex: 1; -webkit-appearance: none; height: 3px; border-radius: 2px; background: var(--surface2); outline: none; cursor: pointer; }
.volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--text); cursor: pointer; }
.skeleton { background: linear-gradient(90deg, var(--surface) 25%, var(--surface2) 50%, var(--surface) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 6px; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
.idle-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 12px; color: var(--muted); }
.idle-icon { font-size: 48px; opacity: 0.3; }
.idle-text { font-size: 13px; }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
@media (max-width: 768px) {
  .main { flex-direction: column-reverse; }
  .player-panel { width: 100%; height: auto; border-left: none; border-bottom: 1px solid var(--border); }
  .results-panel { max-height: 50vh; padding: 20px; }
  header { padding: 16px 20px; }
  .search-wrap { padding: 20px; }
}
</style>
</head>
<body>
<header>
  <div class="logo">WAV<span>R</span></div>
  <div class="tagline">Stream · Discover · Play</div>
</header>
<div class="search-wrap">
  <div class="search-box">
    <input class="search-input" id="searchInput" type="text" placeholder="Search for any song, artist, or album…" autocomplete="off"/>
    <button class="search-btn" id="searchBtn" onclick="doSearch()">Search</button>
  </div>
</div>
<div class="main">
  <div class="results-panel" id="resultsPanel">
    <div class="idle-state" id="idleState">
      <div class="idle-icon">🎵</div>
      <div class="idle-text">Search for a song to start listening</div>
    </div>
    <div class="results-label" id="resultsLabel" style="display:none">RESULTS</div>
    <div class="result-list" id="resultList"></div>
  </div>
  <div class="player-panel">
    <div class="now-playing-label">NOW PLAYING</div>
    <div class="artwork-wrap">
      <img class="artwork-img" id="artworkImg" src="" alt="" style="display:none"/>
      <div class="artwork-overlay"></div>
      <div class="vinyl-ring" id="vinylRing"></div>
      <div class="waveform" id="waveform"></div>
    </div>
    <div class="track-title" id="trackTitle">—</div>
    <div class="track-artist" id="trackArtist">Select a track to play</div>
    <div style="position:relative; margin-bottom:6px;">
      <div class="progress-bar-bg" id="progressBg" onclick="seekTo(event)">
        <div class="buffer-bar" id="bufferBar"></div>
        <div class="progress-bar-fill" id="progressFill"></div>
      </div>
    </div>
    <div class="time-row">
      <span id="timeCurrent">0:00</span>
      <span id="timeTotal">0:00</span>
    </div>
    <div class="chunk-status">
      <div class="chunk-dot" id="chunkDot"></div>
      <span id="chunkText">No track loaded</span>
    </div>
    <div class="controls">
      <button class="ctrl-btn" onclick="skip(-10)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M11 5V1L6 6l5 5V7c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6H3c0 4.4 3.6 8 8 8s8-3.6 8-8-3.6-8-8-8z"/>
          <text x="7" y="16" font-size="6" fill="currentColor" font-family="monospace" font-weight="bold">10</text>
        </svg>
      </button>
      <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">
        <svg id="playIcon" width="24" height="24" fill="currentColor" viewBox="0 0 24 24">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button class="ctrl-btn" onclick="skip(10)">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M13 5V1l5 5-5 5V7c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6h2c0 4.4-3.6 8-8 8s-8-3.6-8-8 3.6-8 8-8z"/>
          <text x="7" y="16" font-size="6" fill="currentColor" font-family="monospace" font-weight="bold">10</text>
        </svg>
      </button>
    </div>
    <div class="volume-row">
      <svg class="volume-icon" width="16" height="16" fill="currentColor" viewBox="0 0 24 24">
        <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
      </svg>
      <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.85" oninput="setVolume(this.value)"/>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SERVER    = 'http://localhost:3000';
const CHUNK_SEC = 30;   // 30-second chunks → fewer transitions
const PRE_LOAD  = 2;    // chunks to pre-fetch ahead

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
let actx            = null;
let gainNode        = null;
let volume          = 0.85;

// Scheduled Web Audio nodes
let nodes           = [];   // [{source, chunkSec, startAt, dur}]

// Playback reference point
let songOffset      = 0;    // song-time when we last started
let audioRefTime    = 0;    // actx.currentTime at that moment

let currentTrack    = null;
let totalDuration   = 0;
let isPlaying       = false;

// Chunk storage: chunkSec → ArrayBuffer
let chunkCache      = {};
let loadingSet      = new Set();

let tickId          = null;
let waveId          = null;

// ═══════════════════════════════════════════════════════
// WAVEFORM
// ═══════════════════════════════════════════════════════
const waveEl = document.getElementById('waveform');
for (let i = 0; i < 28; i++) {
  const b = document.createElement('div');
  b.className = 'waveform-bar';
  b.style.height = '4px';
  waveEl.appendChild(b);
}
function animateWave(on) {
  clearInterval(waveId);
  const bars = waveEl.querySelectorAll('.waveform-bar');
  if (!on) { bars.forEach(b => b.style.height = '4px'); return; }
  waveId = setInterval(() => bars.forEach(b => b.style.height = (Math.random()*32+4)+'px'), 120);
}

// ═══════════════════════════════════════════════════════
// SEARCH
// ═══════════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('keydown', e => { if(e.key==='Enter') doSearch(); });

async function doSearch() {
  const q = document.getElementById('searchInput').value.trim();
  if (!q) return;
  const btn = document.getElementById('searchBtn');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('idleState').style.display = 'none';
  document.getElementById('resultsLabel').style.display = 'block';
  const list = document.getElementById('resultList');
  list.innerHTML = Array(5).fill(`<div class="result-card"><div class="result-thumb skeleton"></div><div class="result-info"><div class="result-title skeleton" style="width:70%;height:14px;margin-bottom:8px">&nbsp;</div><div class="skeleton" style="width:40%;height:10px">&nbsp;</div></div></div>`).join('');
  try {
    const data = await fetch(`${SERVER}/search?q=${encodeURIComponent(q)}`).then(r=>r.json());
    renderResults(data);
  } catch(e) {
    list.innerHTML = `<div style="color:var(--accent3);font-size:13px;padding:20px">⚠ Could not reach server.</div>`;
  }
  btn.disabled = false; btn.textContent = 'Search';
}

function renderResults(items) {
  const list = document.getElementById('resultList');
  list.innerHTML = '';
  items.forEach(item => {
    const c = document.createElement('div');
    c.className = 'result-card';
    c.dataset.id = item.id;
    c.innerHTML = `
      <img class="result-thumb" src="${item.thumbnail}" loading="lazy" onerror="this.style.background='#1a1a25'"/>
      <div class="result-info">
        <div class="result-title">${esc(item.title)}</div>
        <div class="result-meta">${esc(item.uploader)}</div>
      </div>
      <div class="result-dur">${fmt(item.duration)}</div>`;
    c.onclick = () => loadTrack(item);
    list.appendChild(c);
  });
}

// ═══════════════════════════════════════════════════════
// LOAD TRACK
// ═══════════════════════════════════════════════════════
async function loadTrack(item) {
  document.querySelectorAll('.result-card').forEach(c => c.classList.toggle('active', c.dataset.id===item.id));
  hardStop();
  chunkCache = {}; loadingSet.clear();
  currentTrack  = item;
  totalDuration = item.duration || 0;
  document.getElementById('trackTitle').textContent  = item.title;
  document.getElementById('trackArtist').textContent = item.uploader;
  document.getElementById('timeTotal').textContent   = fmt(totalDuration);
  const img = document.getElementById('artworkImg');
  img.src = item.thumbnail; img.style.display = 'block';

  if (!totalDuration) {
    try {
      const d = await fetch(`${SERVER}/info/${item.id}`).then(r=>r.json());
      totalDuration = d.duration || 0;
      document.getElementById('timeTotal').textContent = fmt(totalDuration);
    } catch(_) {}
  }
  await startFrom(0);
}

// ═══════════════════════════════════════════════════════
// WEB AUDIO ENGINE — GAPLESS
// ═══════════════════════════════════════════════════════
async function ensureACtx() {
  if (!actx || actx.state === 'closed') {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = actx.createGain();
    gainNode.gain.value = volume;
    gainNode.connect(actx.destination);
  }
  if (actx.state === 'suspended') await actx.resume();
}

async function startFrom(songSec) {
  await ensureACtx();
  killNodes();

  songOffset   = songSec;
  audioRefTime = actx.currentTime;
  isPlaying    = true;
  updateIcon(); animateWave(true);
  document.getElementById('vinylRing').classList.add('spinning');

  // Schedule first chunk, then pipeline the rest
  await pipelineFrom(songSec);
  startTick();
}

async function pipelineFrom(songSec) {
  const firstChunk  = chunkFloor(songSec);
  const offsetInFirst = songSec - firstChunk;

  // When to start playing on the audio clock
  // Use a 100ms lead time so decoding doesn't cause gaps
  let scheduleAt = actx.currentTime + 0.1;

  for (let i = 0; i <= PRE_LOAD; i++) {
    const cs = firstChunk + i * CHUNK_SEC;
    if (totalDuration && cs >= totalDuration) break;

    const buf = await fetchChunk(cs);
    if (!buf || !isPlaying) return;

    let audioBuf;
    try { audioBuf = await actx.decodeAudioData(buf.slice(0)); }
    catch(e) { console.warn('decode fail', e); continue; }

    const trimStart = (i === 0) ? offsetInFirst : 0;
    const playDur   = audioBuf.duration - trimStart;
    if (playDur <= 0) continue;

    const src = actx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(gainNode);
    src.start(scheduleAt, trimStart, playDur);

    nodes.push({ source: src, chunkSec: cs, startAt: scheduleAt, dur: playDur });

    // Immediately pre-fetch next chunk in background (don't await)
    const nextCs = cs + CHUNK_SEC;
    if (!totalDuration || nextCs < totalDuration) fetchChunk(nextCs);

    scheduleAt += playDur;
  }

  // Keep scheduling ahead continuously
  scheduleLoop();
}

// Runs every second to push new chunks into the schedule
function scheduleLoop() {
  if (!isPlaying) return;
  const last = nodes[nodes.length - 1];
  if (!last) return;

  const lastChunkEnd = last.chunkSec + CHUNK_SEC;
  const currentSong  = getSongTime();
  const lookAhead    = CHUNK_SEC * PRE_LOAD;

  if (lastChunkEnd - currentSong < lookAhead) {
    const nextCs = lastChunkEnd;
    if (totalDuration && nextCs >= totalDuration) return;

    fetchChunk(nextCs).then(buf => {
      if (!buf || !isPlaying) return;
      actx.decodeAudioData(buf.slice(0)).then(audioBuf => {
        if (!isPlaying) return;
        const scheduleAt = last.startAt + last.dur;
        const src = actx.createBufferSource();
        src.buffer = audioBuf;
        src.connect(gainNode);
        src.start(scheduleAt, 0, audioBuf.duration);
        const entry = { source: src, chunkSec: nextCs, startAt: scheduleAt, dur: audioBuf.duration };
        nodes.push(entry);

        // Prefetch one more
        const nn = nextCs + CHUNK_SEC;
        if (!totalDuration || nn < totalDuration) fetchChunk(nn);
      }).catch(()=>{});
    });
  }
}

function killNodes() {
  nodes.forEach(n => { try { n.source.stop(); } catch(_) {} });
  nodes = [];
}

function hardStop() {
  killNodes();
  isPlaying = false;
  clearInterval(tickId);
  updateIcon(); animateWave(false);
  document.getElementById('vinylRing').classList.remove('spinning');
}

// ═══════════════════════════════════════════════════════
// CHUNK FETCHING
// ═══════════════════════════════════════════════════════
function chunkFloor(t) { return Math.floor(t / CHUNK_SEC) * CHUNK_SEC; }

async function fetchChunk(cs) {
  if (chunkCache[cs]) return chunkCache[cs];
  if (loadingSet.has(cs)) {
    return new Promise(res => {
      const iv = setInterval(() => { if(chunkCache[cs]) { clearInterval(iv); res(chunkCache[cs]); } }, 150);
    });
  }
  loadingSet.add(cs);
  const remaining = totalDuration ? totalDuration - cs : CHUNK_SEC;
  const dur = Math.min(CHUNK_SEC, remaining);
  if (dur <= 0) { loadingSet.delete(cs); return null; }

  setStatus('loading', `Buffering ${fmt(cs)}–${fmt(cs+dur)}…`);
  try {
    const url = `${SERVER}/chunk/${currentTrack.id}?start=${cs}&duration=${dur}`;
    const ab  = await fetch(url).then(r => r.arrayBuffer());
    chunkCache[cs] = ab;
    loadingSet.delete(cs);
    setStatus('ready', `Buffered up to ${fmt(cs+dur)}`);
    updateBufferBar();
    cleanOld();
    return ab;
  } catch(e) {
    loadingSet.delete(cs);
    setStatus('idle', 'Buffer error');
    return null;
  }
}

function cleanOld() {
  const keep = Math.max(0, chunkFloor(getSongTime()) - CHUNK_SEC);
  Object.keys(chunkCache).forEach(k => { if(parseInt(k) < keep) delete chunkCache[k]; });
  if (currentTrack) fetch(`${SERVER}/chunk/${currentTrack.id}?keepStart=${keep}`, {method:'DELETE'}).catch(()=>{});
}

// ═══════════════════════════════════════════════════════
// TICK
// ═══════════════════════════════════════════════════════
function getSongTime() {
  if (!actx || !isPlaying) return songOffset;
  return songOffset + (actx.currentTime - audioRefTime);
}

function startTick() {
  clearInterval(tickId);
  tickId = setInterval(() => {
    if (!isPlaying) return;
    const t = getSongTime();
    if (totalDuration && t >= totalDuration - 0.3) { hardStop(); updateUI(totalDuration); return; }
    updateUI(t);
    scheduleLoop();
    // Drop expired nodes from the list
    const now = actx.currentTime;
    nodes = nodes.filter(n => n.startAt + n.dur > now - 1);
    cleanOld();
  }, 250);
}

function updateUI(t) {
  const pct = totalDuration ? (t/totalDuration)*100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCurrent').textContent = fmt(t);
}

function updateBufferBar() {
  if (!totalDuration) return;
  const maxBuf = Math.max(...Object.keys(chunkCache).map(Number), 0) + CHUNK_SEC;
  document.getElementById('bufferBar').style.width = Math.min(100, (maxBuf/totalDuration)*100) + '%';
}

// ═══════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════
async function togglePlay() {
  if (!currentTrack) return;
  if (isPlaying) {
    songOffset = getSongTime();
    hardStop();
    if (actx) actx.suspend();
  } else {
    await startFrom(songOffset);
  }
}

async function skip(secs) {
  if (!currentTrack) return;
  const t = Math.max(0, Math.min(totalDuration||9999, getSongTime()+secs));
  await startFrom(t);
}

async function seekTo(e) {
  if (!currentTrack || !totalDuration) return;
  const rect = document.getElementById('progressBg').getBoundingClientRect();
  const t = Math.max(0, Math.min(1, (e.clientX-rect.left)/rect.width)) * totalDuration;
  await startFrom(t);
}

function setVolume(v) {
  volume = parseFloat(v);
  if (gainNode) gainNode.gain.value = volume;
}

function updateIcon() {
  document.getElementById('playIcon').innerHTML = isPlaying
    ? `<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>`
    : `<path d="M8 5v14l11-7z"/>`;
}

// ═══════════════════════════════════════════════════════
// STATUS & UTILS
// ═══════════════════════════════════════════════════════
function setStatus(state, text) {
  const dot = document.getElementById('chunkDot');
  dot.className = 'chunk-dot' + (state==='loading' ? ' loading' : state==='ready' ? ' ready' : '');
  document.getElementById('chunkText').textContent = text;
}
function fmt(s) {
  if (!s && s!==0) return '—';
  s = Math.floor(s);
  return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`;
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
